name: CI

# Builds DaveyThesis2024 with Lean (per `lean-toolchain`). The build
# includes DaveyThesis2024/AxiomCheck.lean, which uses `#guard_msgs`
# to fail the build if the axiom sets of pentagon_bound_full,
# pentagon_bound_simple, strong_chromatic_index_bound, or
# strong_chromatic_index_bipartite (+ their _thesis_tight variants)
# drift from the committed expectations. So a green CI run also
# certifies axiom hygiene.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read lean-toolchain
        id: lean
        run: echo "version=$(cat lean-toolchain)" >> "$GITHUB_OUTPUT"

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Lean toolchain
        run: |
          elan toolchain install "${{ steps.lean.outputs.version }}"
          elan override set "${{ steps.lean.outputs.version }}"
          lean --version

      - name: Cache lake build artifacts
        uses: actions/cache@v5
        with:
          path: |
            .lake/build
            .lake/packages/*/lake-manifest.json
            .lake/packages/*/.lake/build
          # Bust the cache when mathlib pin moves OR when the toolchain
          # changes; otherwise reuse it across pushes for speed.
          key: lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Fetch mathlib cache
        run: |
          lake exe cache get || true

      - name: Build
        run: lake build

      - name: Verify clean build
        run: |
          if [ ! -f ".lake/build/lib/lean/DaveyThesis2024/AxiomCheck.olean" ]; then
            echo "::error::AxiomCheck.olean not built — axiom hygiene check did not run."
            exit 1
          fi
          echo "Build complete; AxiomCheck.lean compiled, axiom hygiene preserved."
